<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mexico city - Country page</title>
    <meta name="description" content="this page is about the place I live, show dates and the weather, i hope like you, i love this place.">
    <meta name="author" content="Jose Rodrigo Olivarez Marcelino">
    <link rel="stylesheet" href="styles/place.css">
    <link rel="stylesheet" href="styles/place-large.css" media="(min-width: 1000px)">
    <script src="scripts/place.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Quicksand:wght@300..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>
<body>
    <header>
        <h1>MÉXICO CITY</h1>
    </header>
    <main>
        <picture class="hero">
            <source srcset="images/mexico-large.webp" media="(min-width: 1000px)">
            <img src="images/mexico.webp" alt="National Museum of the Revolution" width="500" height="250">
        </picture>

        <section class="data">
            <h2>Data</h2>
            <p><strong>Area: </strong>1,485 km²</p>
            <p><strong>Population: </strong>22.75 million</p>
            <p><strong>Capital: </strong>CDMX</p>
            <p><strong>Languages: </strong>Spanish and English</p>
            <p><strong>Time Zone: </strong>GMT-6</p>
            <p><strong>Calling Code: </strong>+52</p>
        </section>

        <section class="weather">
            <h2 class="weather-head">Weather</h2>
            <img src="images/cloud-sun.svg" alt="Weather icon" class="weather-icon">
            <p><strong>Temperature: </strong><span id="temp">15</span>°C</p>
            <p><strong>Conditions: </strong>Partly Cloudy</p>
            <p><strong>wind: </strong><span id="windSpeed">8</span>km/h</p>
            <p><strong>Wind Chill: </strong><span id="wind-chill">N/A</span></p>
        </section>
    </main>
    <footer>
        <p>&copy;<span id="currentYear"></span> - Rodrigo Olivarez - CDMX</p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
